<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스케줄</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<body>

<div class="sidebar">

    <div class="logo">
    <img src="logo.png" alt="가양삼성정형외과">
</div>

    <div class="nav">
        <button onclick="location.href='index.html'"><span class="gold-dot"></span> 홈</button>

        <button onclick="location.href='stats.html'"><span class="gold-dot"></span> 통계</button>
    </div>

</div>

<div class="schedule-main">

    <div class="schedule-card">

        <!-- 상단 -->
        <div class="top-bar">

            <button onclick="prevMonth()">◀</button>

            <div class="month-title">

    <span id="monthText"></span>

    <select id="yearSelect" onchange="changeDate()">
    </select>

    <select id="monthSelect" onchange="changeDate()">
    </select>

</div>

            <button onclick="nextMonth()">▶</button>

        </div>

        <!-- 달력 -->
        <div class="calendar" id="calendar">

        </div>

    </div>

</div>



   

    <script>

    const today = new Date();

let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
    const dayNames = [
        "일", "월", "화", "수", "목", "금", "토"
    ];

    // 년도/월 select 생성
    function setupSelects() {

        const yearSelect =
            document.getElementById("yearSelect");

        const monthSelect =
            document.getElementById("monthSelect");

        // 년도
        for(let y = 2020; y <= 2035; y++) {

            yearSelect.innerHTML += `
                <option value="${y}">
                    ${y}년
                </option>
            `;
        }

        // 월
        for(let m = 1; m <= 12; m++) {

            monthSelect.innerHTML += `
                <option value="${m - 1}">
                    ${m}월
                </option>
            `;
        }

        yearSelect.value = currentYear;
        monthSelect.value = currentMonth;
    }

    // 달력 렌더
    function renderCalendar() {

    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    for (let day of dayNames) {
        calendar.innerHTML += `
            <div class="day-name">${day}</div>
        `;
    }

    const firstDay = new Date(currentYear, currentMonth, 1);
    const startDay = firstDay.getDay();

    const lastDate = new Date(
        currentYear,
        currentMonth + 1,
        0
    ).getDate();

    for (let i = 0; i < startDay; i++) {
        calendar.innerHTML += `
            <div class="day empty"></div>
        `;
    }

    for (let date = 1; date <= lastDate; date++) {

        const dayOfWeek = new Date(currentYear, currentMonth, date).getDay();

        let dayClass = "";

        if (dayOfWeek === 0) {
            dayClass = "sun";
        }

        if (dayOfWeek === 6) {
            dayClass = "sat";
        }

        calendar.innerHTML += `
            <div class="day ${dayClass}">

               <div class="date" style="c
               olor: ${getDateColor(date)};">
    ${date}
</div>

                <div class="inputs">

    <textarea class="doctor"
        data-date="${currentYear}-${currentMonth + 1}-${date}"
        placeholder="의사"></textarea>

    <textarea class="room"
        data-date="${currentYear}-${currentMonth + 1}-${date}"
        placeholder="방과"></textarea>

    <textarea class="nurse"
        data-date="${currentYear}-${currentMonth + 1}-${date}"
        placeholder="간호"></textarea>

    <textarea class="desk"
        data-date="${currentYear}-${currentMonth + 1}-${date}"
        placeholder="원무"></textarea>

    <textarea class="therapy"
        data-date="${currentYear}-${currentMonth + 1}-${date}"
        placeholder="물치"></textarea>

        
</div>

            </div>
        `;
    }

    document.getElementById("yearSelect").value = currentYear;
    document.getElementById("monthSelect").value = currentMonth;
}

    // 이전달
    function prevMonth() {

        currentMonth--;

        if(currentMonth < 0) {

            currentMonth = 11;
            currentYear--;
        }

        renderCalendar();
    }

    // 다음달
    function nextMonth() {

        currentMonth++;

        if(currentMonth > 11) {

            currentMonth = 0;
            currentYear++;
        }

        renderCalendar();
    }

    // 직접 선택
    function changeDate() {

        currentYear =
            parseInt(
                document.getElementById(
                    "yearSelect"
                ).value
            );

        currentMonth =
            parseInt(
                document.getElementById(
                    "monthSelect"
                ).value
            );

        renderCalendar();
    }

    setupSelects();
    renderCalendar();
function getDateColor(date) {

    const day =
        new Date(currentYear, currentMonth, date).getDay();

    const holidays = [

    "2026-1-1",   // 신정

    "2026-2-16",  // 설날 연휴
    "2026-2-17",
    "2026-2-18",

    "2026-3-1",   // 삼일절

    "2026-5-5",   // 어린이날

    "2026-6-6",   // 현충일

    "2026-8-15",  // 광복절

    "2026-9-24",  // 추석 연휴
    "2026-9-25",
    "2026-9-26",

    "2026-10-3",  // 개천절

    "2026-10-9",  // 한글날

    "2026-12-25"  // 크리스마스
];

    const current =
        `${currentYear}-${currentMonth + 1}-${date}`;

    // 공휴일
    if (holidays.includes(current)) {
        return "red";
    }

    // 일요일
    if (day === 0) {
        return "red";
    }

    // 토요일
    if (day === 6) {
        return "blue";
    }

    return "black";
}
</script>

<script type="module" src="schedule.js"></script>
