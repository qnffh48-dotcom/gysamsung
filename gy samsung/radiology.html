<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>방과</title>
    <link rel="stylesheet" href="style.css">
</head>
<link rel="stylesheet" href="style.css">
<body>


    <div class="sidebar">
        <div class="logo">
            <span class="gayang">가양</span><span class="samsung">삼성</span><span class="ortho">정형외과</span>
        </div>

        <div class="nav">
            <button onclick="location.href='index.html'">🏠 홈</button>
            <button onclick="location.href='schedule.html'">📅 스케줄</button>
            <button onclick="location.href='stats.html'">📊 통계</button>
            
        </div>
    </div>

    <main class="radiology-main">

    <div class="radiology-layout">

        <!-- 탭 버튼 -->
        <div class="tab-buttons">

            <button class="tab-btn active"
                    data-tab="closing">
                마감일지
            </button>

            <button class="tab-btn"
                    data-tab="temp1">
                임시1
            </button>

            <button class="tab-btn"
                    data-tab="temp2">
                임시2
            </button>

            <button class="tab-btn"
                    data-tab="temp3">
                임시3
            </button>

        </div>

        <!-- 큰 흰박스 -->
        <div class="tab-content">

            <!-- 마감일지 -->
            <div class="tab-page active"
                 id="closing">

                <table class="closing-table">

                    <tr>
                        <th colspan="2" class="main-title">
                            5월 13일 영상의학과 마감일지
                        </th>
                    </tr>

                    <tr>
                        <th colspan="2" class="sub-title">
                            C-arm
                        </th>
                    </tr>

                    <tr>
                        <th>구분</th>
                        <th>건수</th>
                    </tr>

                    <tr>
                        <td>정형외과1(정)</td>
                        <td>
                            <input class="report-input carm-count"
                                   data-key="carm_os1"
                                   value="0개">
                        </td>
                    </tr>

                    <tr>
                        <td>신경과(노)</td>
                        <td>
                            <input class="report-input carm-count"
                                   data-key="carm_neuro"
                                   value="0개">
                        </td>
                    </tr>

                    <tr>
                        <td>정형외과3(욱)</td>
                        <td>
                            <input class="report-input carm-count"
                                   data-key="carm_os3"
                                   value="0개">
                        </td>
                    </tr>

                    <tr>
                        <td>정형외과4(채)</td>
                        <td>
                            <input class="report-input carm-count"
                                   data-key="carm_os4"
                                   value="0개">
                        </td>
                    </tr>

                    <tr>
                        <td>정형외과5(남)</td>
                        <td>
                            <input class="report-input carm-count"
                                   data-key="carm_os5"
                                   value="0개">
                        </td>
                    </tr>

                    <tr class="total">
                        <td>총합</td>
                        <td>
                            <input class="report-input total-input"
                                   data-key="carm_total"
                                   value="0개"
                                   readonly>
                        </td>
                    </tr>

                    <tr>
                        <th colspan="2" class="sub-title">
                            기타(관절조영)
                        </th>
                    </tr>

                    <tr>
                        <th>구분</th>
                        <th>건수</th>
                    </tr>

                    <tr>
                        <td>관절조영</td>
                        <td>
                            <input class="report-input"
                                   data-key="arthrogram"
                                   value="0개">
                        </td>
                    </tr>

                </table>

            </div>

            <!-- 임시1 -->
            <div class="tab-page"
                 id="temp1">

                <h1>임시1</h1>

            </div>

            <!-- 임시2 -->
            <div class="tab-page"
                 id="temp2">

                <h1>임시2</h1>

            </div>

            <!-- 임시3 -->
            <div class="tab-page"
                 id="temp3">

                <h1>임시3</h1>

            </div>

        </div>

    </div>

</main>

<script src="radiology-tabs.js"></script>
<script type="module" src="radiology.js"></script>
